name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Detect pre-release
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'apps/desktop/src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Dictto ${{ github.ref_name }}'
          releaseBody: 'Download the installer below to install Dictto. See [README](https://github.com/dictto-app/dictto#install) for instructions.'
          releaseDraft: false
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          includeUpdaterJson: true

      - name: Add fixed-name download asset
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          # Find the versioned .exe in the release
          EXE_NAME=$(gh release view "$TAG" --json assets --jq '.assets[].name | select(endswith("-setup.exe"))')
          if [ -z "$EXE_NAME" ]; then
            echo "No setup exe found in release assets"
            exit 1
          fi
          # Download, rename, and re-upload with fixed name
          gh release download "$TAG" --pattern "$EXE_NAME" --dir .
          cp "$EXE_NAME" "Dictto-Setup.exe"
          # Delete existing fixed-name asset if it exists (for re-runs)
          gh release delete-asset "$TAG" "Dictto-Setup.exe" --yes 2>/dev/null || true
          gh release upload "$TAG" "Dictto-Setup.exe"
          echo "Uploaded Dictto-Setup.exe (copy of $EXE_NAME)"
